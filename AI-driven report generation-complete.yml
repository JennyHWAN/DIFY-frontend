          \n    grouped = OrderedDict((d, []) for d in ordered_domains)\n\n    def\
          \ add_pack_list(pack_list):\n        for raw_pack in pack_list:\n      \
          \      domain, controls = parse_pack(raw_pack)\n            if not domain\
          \ or not controls:\n                continue\n\n            normalized_domain\
          \ = normalize_domain(domain, output_language)\n\n            if normalized_domain\
          \ not in grouped:\n                grouped[normalized_domain] = []\n\n \
          \           existing_keys = {x.lower() for x in grouped[normalized_domain]}\n\
          \            for c in controls:\n                k = c.lower()\n       \
