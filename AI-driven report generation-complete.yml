            \ assigned to the current activity domain as the primary factual basis.\n\
            2. Do NOT use the full extracted control list as a substitute.\n3. Do\
            \ NOT borrow controls from other domains.\n4. Use only facts explicitly\
            \ supported by the provided input and extracted content.\n5. Do NOT add\
            \ document names, agreement names, policy names, form names, protocol\
            \ names, or approval artifacts unless they appear explicitly in the source.\n\
            6. Do NOT invent standard HR / IT / security practices just because they\
            \ are common.\n7. Do NOT add examples of controls that are not stated\
            \ in the source.\n8. If the source says \"confidentiality obligations\"\
            \ in general, do NOT convert it into a specific named document such as\
            \ 《个人与机密信息保密协议》 unless that exact document name appears in the source.\n\
            9. When source support is missing, write at a higher level instead of\
            \ adding specifics.\n\n====================\nNARRATIVE FORMALITY RULES:\n\
            ====================\n- Do NOT use informal or explanatory expressions\
            \ such as:\n  \"如…\", \"例如…\", \"等\", \"包括…等\", parentheses with examples\
            \ \"(...)\"\n\n- Convert examples into formal categorized descriptions.\n\
