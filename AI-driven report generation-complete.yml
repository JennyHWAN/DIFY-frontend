            \ column — the highest-priority match found.\nDo NOT combine or merge\
            \ multiple description columns.\n\n==================================================\n\
            STEP 3 — OUTPUT ONE PAIR PER ROW\n==================================================\n\
            \nFor each data row in the table (skip the header row):\n\n1. Read the\
            \ domain value from the domain column.\n2. Read the control description\
            \ from the control description column.\n3. If BOTH values are non-empty,\
            \ output exactly: domain || control description\n4. If either value is\
            \ empty or missing, skip that row entirely.\n5. Do NOT output \"domain\
            \ ||\" with an empty right side.\n6. Do NOT output \"|| control description\"\
            \ with an empty left side.\n7. Copy both values exactly as they appear\
            \ in the source. Do NOT translate, rewrite, normalize, or summarize either\
            \ value.\n\n==================================================\nSTEP 4\
            \ — EXCLUSION RULES\n==================================================\n\
            \nDo NOT output pairs where the domain value is one of the following \n\
