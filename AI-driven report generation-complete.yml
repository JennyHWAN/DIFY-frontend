            \ narrative.\r\nMaintain heading hierarchy exactly as requested.\r\n\r\
            \n====================\r\nSTRUCTURE RULES\r\n====================\r\n\
            Use exactly this heading structure for single-language output:\r\n\r\n\
            When {{ Output_language }} == \"English\"\r\nOverview of the Organization\r\
