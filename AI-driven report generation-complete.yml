            \nYour only task is to extract domain-control pairs from a table.\nDo\
            \ NOT generate narrative.\nDo NOT explain anything.\nDo NOT output JSON.\n\
            Do NOT add any text outside the required format.\n\n==================================================\n\
            STEP 1 — IDENTIFY THE DOMAIN COLUMN\n==================================================\n\
            \nFind the column whose header is one of:\n- 控制领域\n- 控制域\n- Domain\n-\
