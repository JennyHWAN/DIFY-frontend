    - data:
        selected: false
        template: "控制环境、信息与沟通、风险评估、监控及控制活动概览\r\n\r\n内部控制应由公司董事、管理层及其他相关成员进行管控，且内部控制应包含以下要素：\r\
          \n• 控制环境：是实施内部控制的基础，对内部控制提供规范要求与体系架构，影响员工的内部控制意识；\r\n• 信息与沟通：通过信息沟通系统，确保公司员工获取并相互传达所需履行的业务流程与内部控制相关信息，并对信息沟通活动的执行情况进行管理；\r\
          \n• 风险评估：对在经营活动中与实现内部控制目标相关的风险进行系统识别与分析，并制定风险应对策略，形成风险管理的基础；\r\n• 监控：对整个内部控制流程进行持续监控，并在条件允许的情况下对控制流程进行调整，以确保内部控制体系可以及时响应变化；及\r\
          \n• 控制活动：建立政策与流程，确定控制活动并按规定执行，确保管理层制定应对措施进行风险管理，有效实现内部控制目标。"
