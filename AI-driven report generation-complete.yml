            \ RULES\r\n====================\r\nYou must strictly follow the variable\
            \ {{ Output_language }}.\r\n\r\n- If {{ Output_language }} == \"中文\":\r\
            \n  Output must be entirely in Chinese.\r\n  Do not output English paragraphs.\r\
            \n  Do not translate headings into English.\r\n  Do not mix Chinese and\
