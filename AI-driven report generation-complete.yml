            That content belongs to the entity-level control section instead.\r\n\r\
            \nIf official website content {{ result }} is provided, use it carefully\
            \ as factual support.\r\nIf a detail is not supported by the inputs or\
            \ retrieved references, do not invent it.\r\nIf certain information is\
            \ missing, write a reasonable, general, audit-style description without\
            \ fabricating precise facts.\r\n\r\n====================\r\nSTYLE REQUIREMENTS\r\
            \n====================\r\nWriting style must be:\r\n- formal\r\n- precise\r\
            \n- neutral\r\n- descriptive\r\n- audit-report appropriate\r\n- logically\
            \ structured\r\n\r\nAvoid:\r\n- promotional wording\r\n- sales language\r\
            \n- unsupported claims\r\n- excessive repetition\r\n- bullet-heavy formatting\
