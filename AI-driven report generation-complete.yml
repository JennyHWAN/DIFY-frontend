          ,\n            \"Risk Assessment\": \"Risk Assessment\",\n            \"\
          Monitoring\": \"Monitoring\",\n        }\n    else:\n        mapping = {\n\
          \            \"控制环境\": \"控制环境\",\n            \"信息与沟通\": \"信息与沟通\",\n  \
          \          \"风险评估\": \"风险评估\",\n            \"监控\": \"监控\",\n          \
          \  \"Control Environment\": \"控制环境\",\n            \"Information and Communication\"\
          : \"信息与沟通\",\n            \"Risk Assessment\": \"风险评估\",\n            \"\
          Monitoring\": \"监控\",\n        }\n    return mapping.get(d, d)\n\ndef main(text:\
          \ str = \"\", output_language: str = \"中文\"):\n    text = (text or \"\"\
          ).strip()\n    packs = re.findall(r'<<<PACK>>>\\s*(.*?)\\s*<<<END_PACK>>>',\
          \ text, flags=re.S)\n\n    grouped = {\n        \"Control Environment\"\
          : [],\n        \"Information and Communication\": [],\n        \"Risk Assessment\"\
          : [],\n        \"Monitoring\": [],\n    }\n\n    for pack in packs:\n  \
          \      m_domain = re.search(r'\\[DOMAIN\\]\\s*(.*?)\\s*(?=\\[CONTROLS\\\
          ]|\\Z)', pack, flags=re.S)\n        m_controls = re.search(r'\\[CONTROLS\\\
          ]\\s*(.*)', pack, flags=re.S)\n\n        if not m_domain or not m_controls:\n\
          \            continue\n\n        raw_domain = m_domain.group(1).strip()\n\
          \        controls_block = m_controls.group(1).strip()\n\n        canonical\
          \ = None\n        for en_name, aliases in DOMAIN_ALIASES.items():\n    \
          \        if raw_domain in aliases:\n                canonical = en_name\n\
          \                break\n        if not canonical:\n            continue\n\
          \n        for line in controls_block.splitlines():\n            item = re.sub(r'^[-*]\\\
