    - data:
        code: "def main(clean_pairs: str = \"\"):\n    seen = []\n    seen_lower =\
          \ set()\n    valid_lines = []\n\n    for line in clean_pairs.strip().splitlines():\n\
          \        if \"||\" not in line:\n            continue\n        domain, control\
          \ = line.split(\"||\", 1)\n        domain = domain.strip()\n        control\
          \ = control.strip()\n        # Build domain list\n        if domain and\
          \ domain.lower() not in seen_lower:\n            seen.append(domain)\n \
          \           seen_lower.add(domain.lower())\n        # Only keep pairs with\
          \ non-empty control\n        if domain and control:\n            valid_lines.append(f\"\
          {domain} || {control}\")\n\n    return {\n        \"activity_domains_text\"\
          : \"\\n\".join(f\"- {d}\" for d in seen),\n        \"clean_pairs\": \"\\\
          n\".join(valid_lines)\n    }"
