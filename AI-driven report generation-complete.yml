          ,\n            \"Information and Communication\": \"信息与沟通\",\n         \
          \   \"Risk Assessment\": \"风险评估\",\n            \"Monitoring\": \"监控\",\n\
          \        }\n\n    return mapping.get(d, d)\n\ndef build_pack(domain: str,\
          \ controls: list[str]) -> str:\n    lines = [\"[DOMAIN]\", domain, \"\"\
          , \"[CONTROLS]\"]\n    for c in controls:\n        lines.append(f\"- {c}\"\
          )\n    return \"\\n\".join(lines)\n\ndef main(entity_domain_packs_direct=None,\
          \ entity_domain_packs_assigned=None, output_language=\"中文\"):\n    direct\
          \ = entity_domain_packs_direct or []\n    assigned = entity_domain_packs_assigned\
          \ or []\n\n    if output_language == \"English\":\n        ordered_domains\
