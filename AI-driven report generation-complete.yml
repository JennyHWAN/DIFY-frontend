            \ mix bilingual headings.\r\n\r\n- If {{ Output_language }} == \"Both\"\
            :\r\n  Output bilingual content in this order:\r\n  1. Chinese version\
            \ first\r\n  2. English version second\r\n  The Chinese and English versions\
            \ must correspond in meaning.\r\n  Do not interleave sentence-by-sentence\
            \ translation.\r\n  Output complete Chinese section first, then complete\
            \ English section.\r\n\r\n====================\r\nSECTION SCOPE\r\n====================\r\
            \nGenerate only the following part:\r\n\r\nWhen {{ Output_language }}\
            \ == \"English\"\r\nOverview of the Organization\r\nCompany Overview\r\
            \nProducts and Services\r\n\r\nWhen {{ Output_language }} == \"中文\"\r\n\
            组织概况\r\n公司简介\r\n产品与服务\r\n\r\nDo not generate content outside this scope.\r\
            \nDo not generate later sections.\r\nDo not generate summaries, conclusions,\
            \ recommendations, marketing language, or future outlook.\r\n\r\n====================\r\
            \nCONTENT REQUIREMENTS\r\n====================\r\nThe section should:\r\
            \n- introduce the organization in a professional and neutral tone,\r\n\
            - describe its background, business nature, and relevant development history,\r\
            \n- describe the services relevant to the system,\r\n- describe the system\
            \ and its role in service delivery,\r\n- stay factual, structured, and\
            \ suitable for audit reporting,\r\n- avoid exaggerated, promotional, or\
            \ speculative wording.\r\n\r\nThis section is limited to:\r\n- company\
            \ background and business nature,\r\n- principal products and services,\r\
            \n- the in-scope system or service and its role in supporting service\
            \ delivery.\r\n\r\nDo NOT include:\r\n- organization structure details,\r\
            \n- department / team / center responsibilities,\r\n- governance, risk\
            \ management, compliance, HR, DevOps, technical support, SAP basis, virtualization,\
            \ or network team descriptions,\r\n- control environment content,\r\n\
            - entity-level control narratives,\r\n- control activity narratives,\r\
            \n- monitoring, access control, backup, change management, incident management,\
