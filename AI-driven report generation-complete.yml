            STEP 2 — IDENTIFY THE CONTROL DESCRIPTION COLUMN\n==================================================\n\
            \nFind the column whose header best matches one of the following, \nin\
            \ this priority order:\n\n1. 控制点描述\n2. 控制描述\n3. Control Description\n\
