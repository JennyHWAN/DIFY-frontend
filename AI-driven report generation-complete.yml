    - data:
        code: "import re\n\nSECTION_NAMES = [\n    \"control_list\",\n    \"system_keywords\"\
          ,\n    \"Entity_Level_Domain\",\n    \"Control_activity_domain\",\n    \"\
          entity_domain_control_pairs\",\n    \"activity_domain_control_pairs\",\n\
          \    \"CO_list\",\n    \"CUEC\",\n    \"CSOC\",\n    \"Terminology\",\n\
          ]\n\nFIXED_ENTITY_DOMAINS_CN = [\n    \"控制环境\",\n    \"信息与沟通\",\n    \"\
          风险评估\",\n    \"监控\",\n]\n\nFIXED_ENTITY_DOMAINS_EN = [\n    \"Control Environment\"\
          ,\n    \"Information and Communication\",\n    \"Risk Assessment\",\n  \
          \  \"Monitoring\",\n]\n\nFORBIDDEN_ACTIVITY_DOMAINS = {\n    \"控制环境\",\n\
          \    \"信息与沟通\",\n    \"风险评估\",\n    \"监控\",\n    \"control environment\"\
          ,\n    \"information and communication\",\n    \"risk assessment\",\n  \
          \  \"monitoring\",\n    \"entity-level controls\",\n    \"entity level controls\"\
          ,\n    \"企业层面控制\",\n    \"公司层面控制\",\n}\n\ndef normalize_text(s: str) ->\
          \ str:\n    if s is None:\n        return \"\"\n\n    replacements = {\n\
          \        \"\\u00a0\": \" \",\n        \"\\u200b\": \"\",\n        \"\\u200c\"\
          : \"\",\n        \"\\u200d\": \"\",\n        \"\\ufeff\": \"\",\n      \
          \  \"\\r\\n\": \"\\n\",\n        \"\\r\": \"\\n\",\n        \"\\t\": \"\
          \ \",\n        \"•\": \"-\",\n        \"●\": \"-\",\n        \"·\": \"-\"\
          ,\n        \"–\": \"-\",\n        \"—\": \"-\",\n    }\n\n    for old, new\
          \ in replacements.items():\n        s = s.replace(old, new)\n\n    s = re.sub(r\"\
          \\n{3,}\", \"\\n\\n\", s)\n    s = re.sub(r\"[ ]{2,}\", \" \", s)\n    return\
          \ s.strip()\n\ndef parse_sections(text: str) -> dict:\n    text = normalize_text(text)\n\
          \    result = {name: [] for name in SECTION_NAMES}\n    current_section\
          \ = None\n\n    for raw_line in text.split(\"\\n\"):\n        line = raw_line.strip()\n\
          \        if not line:\n            continue\n\n        m = re.match(r\"\
          ^\\[([A-Za-z0-9_]+)\\]$\", line)\n        if m:\n            section_name\
          \ = m.group(1)\n            current_section = section_name if section_name\
          \ in result else None\n            continue\n\n        if current_section\
          \ is None:\n            continue\n\n        item = re.sub(r\"^[-*]\\s*\"\
          , \"\", line).strip()\n        if item and item not in {\"-\", \"*\"}:\n\
          \            result[current_section].append(item)\n\n    return result\n\
          \ndef dedupe_keep_order(items):\n    seen = set()\n    output = []\n   \
          \ for item in items:\n        key = item.strip().lower()\n        if key\
          \ and key not in seen:\n            seen.add(key)\n            output.append(item.strip())\n\
          \    return output\n\ndef to_bullet_text(items):\n    if not items:\n  \
          \      return \"\"\n    return \"\\n\".join(f\"- {item}\" for item in items)\n\
          \ndef limit_list(items, max_items=29):\n    return items[:max_items] if\
          \ items else []\n\ndef clean_activity_domains(items):\n    cleaned = []\n\
          \    seen = set()\n    for item in items:\n        t = item.strip()\n  \
          \      k = t.lower()\n        if not t:\n            continue\n        if\
          \ k in FORBIDDEN_ACTIVITY_DOMAINS:\n            continue\n        if k not\
          \ in seen:\n            seen.add(k)\n            cleaned.append(t)\n   \
          \ return cleaned\n\ndef main(text: str, output_language: str = \"中文\") ->\
          \ dict:\n    parsed = parse_sections(text or \"\")\n\n    for key in parsed:\n\
          \        parsed[key] = dedupe_keep_order(parsed[key])\n\n    # Force fixed\
          \ entity domains\n    if output_language == \"English\":\n        entity_domains\
          \ = FIXED_ENTITY_DOMAINS_EN\n    else:\n        # 中文 and Both both use Chinese\
          \ here\n        entity_domains = FIXED_ENTITY_DOMAINS_CN\n\n    activity_domains\
          \ = clean_activity_domains(parsed[\"Control_activity_domain\"])\n\n    return\
          \ {\n        \"control_list_text\": to_bullet_text(parsed[\"control_list\"\
          ]),\n        \"system_keywords\": limit_list(parsed[\"system_keywords\"\
          ], 29),\n        \"Entity_Level_Domain\": entity_domains,\n        \"Control_activity_domain\"\
          : limit_list(activity_domains, 29),\n        \"activity_domain_control_text\"\
          : to_bullet_text(parsed[\"activity_domain_control_pairs\"]),\n        \"\
          CO_list\": limit_list(parsed[\"CO_list\"], 29),\n        \"CUEC\": limit_list(parsed[\"\
          CUEC\"], 29),\n        \"CSOC\": limit_list(parsed[\"CSOC\"], 29),\n   \
          \     \"Terminology\": limit_list(parsed[\"Terminology\"], 29),\n      \
          \  \"entity_domain_control_text\": to_bullet_text(parsed[\"entity_domain_control_pairs\"\
          ]),\n    }"
        code_language: python3
