name: Build Windows EXE

# Push a tag like v1.2.3 to build + publish a GitHub Release that the in-app
# auto-updater consumes. workflow_dispatch still works for a manual test build
# (packaged but not published — downloadable as an artifact).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write   # needed for vpk to create/publish the GitHub Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # vpk upload reads prior tags/releases to build the feed

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller --upgrade

      - name: Install Velopack CLI (vpk)
        run: dotnet tool install -g vpk

      - name: Create .env from secrets
        run: |
          @"
          DIFY_API_BASE_URL=${{ secrets.DIFY_API_BASE_URL }}
          DIFY_API_KEY_MAIN=${{ secrets.DIFY_API_KEY_MAIN }}
          DIFY_API_KEY_SUB1=${{ secrets.DIFY_API_KEY_SUB1 }}
          DIFY_API_KEY_SUB2=${{ secrets.DIFY_API_KEY_SUB2 }}
          TEMPLATE_SOURCE=${{ secrets.TEMPLATE_SOURCE }}
          FEISHU_API_BASE=${{ secrets.FEISHU_API_BASE }}
          FEISHU_APP_ID=${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET=${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_MA_FOLDER_TOKEN=${{ secrets.FEISHU_MA_FOLDER_TOKEN }}
          FEISHU_AR_FOLDER_TOKEN=${{ secrets.FEISHU_AR_FOLDER_TOKEN }}
          FEISHU_LETTERHEAD_FOLDER_TOKEN=${{ secrets.FEISHU_LETTERHEAD_FOLDER_TOKEN }}
          FEISHU_TEMPLATE_INDEX_FOLDER_TOKEN=${{ secrets.FEISHU_TEMPLATE_INDEX_FOLDER_TOKEN }}
          "@ | Set-Content -Encoding UTF8 .env
        shell: pwsh

      - name: Build executable
        run: pyinstaller app-win.spec

      # Tag push (v1.2.3) -> use the tag, stripped of the leading 'v'.
      # Manual run -> fall back to the VERSION file.
      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $v = "${{ github.ref_name }}" -replace '^v',''
          } else {
            $v = (Get-Content VERSION -Raw).Trim()
          }
          echo "version=$v" >> $env:GITHUB_OUTPUT
          echo "Packaging version $v"

      - name: Package with Velopack
        run: >
          vpk pack
          --packId SOC_Report_Generator
          --packVersion ${{ steps.ver.outputs.version }}
          --packDir dist/SOC_Report_Generator
          --mainExe SOC_Report_Generator.exe
          --packTitle "SOC Report Generator"
          --delta none

      # Only publish a Release on a real tag push. vpk first downloads the
      # previous release to compute delta packages, then uploads Setup.exe +
      # the full/delta .nupkg and updates the releases feed.
      - name: Publish GitHub Release
        if: github.ref_type == 'tag'
        run: >
          vpk upload github
          --repoUrl https://github.com/JennyHWAN/DIFY-frontend
          --token ${{ secrets.GITHUB_TOKEN }}
          --tag ${{ github.ref_name }}
          --releaseName "SOC Report Generator ${{ steps.ver.outputs.version }}"
          --publish

      # For manual (non-tag) runs, expose the installer as a downloadable artifact.
      - name: Upload installer artifact
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: SOC_Report_Generator-Setup
          path: Releases/
          if-no-files-found: error
