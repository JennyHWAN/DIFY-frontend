name: Build Windows EXE

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller --upgrade

      - name: Create .env from secrets
        run: |
          @"
          DIFY_API_BASE_URL=${{ secrets.DIFY_API_BASE_URL }}
          DIFY_API_KEY_MAIN=${{ secrets.DIFY_API_KEY_MAIN }}
          DIFY_API_KEY_SUB1=${{ secrets.DIFY_API_KEY_SUB1 }}
          DIFY_API_KEY_SUB2=${{ secrets.DIFY_API_KEY_SUB2 }}
          "@ | Set-Content -Encoding UTF8 .env
        shell: pwsh

      - name: Build executable
        run: pyinstaller app-win.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SOC_Report_Generator
          path: dist/SOC_Report_Generator/
          if-no-files-found: error
